name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  logiclock-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Logiclock scan
        uses: ./
        with:
          python-version: "3.12"
          install-command: pip install -r requirements-lock.txt && pip install . --no-deps
          scan-command: logiclock --strict --no-color scan

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-lock.txt

      - name: Install package + dev tools
        run: |
          pip install -r requirements-lock.txt
          pip install -e . --no-deps
          pip install pytest-cov

      - name: Flake8
        run: flake8 src tests

      - name: Pytest
        run: pytest tests -q --tb=line --cov=logiclock --cov-fail-under=70

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from PyPI and check version
        run: |
          pip install pylogiclock
          logiclock --version
